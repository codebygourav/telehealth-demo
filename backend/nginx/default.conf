# ============================================================
# Backend Docker Nginx - Plain HTTP on port 80
# SSL termination is handled by the HOST nginx on Hostinger
# (via Let's Encrypt / Certbot).
# Locally: access via http://localhost:8210
# Production: accessed internally by host nginx → http://127.0.0.1:8210
# ============================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Trust the X-Forwarded-Proto header from the reverse proxy
    # so Laravel knows the original request was HTTPS
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Real-IP;

    # FastCGI buffer tweaks
    fastcgi_buffer_size 128k;
    fastcgi_buffers 16 128k;
    fastcgi_busy_buffers_size 256k;
    fastcgi_temp_file_write_size 256k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /livewire/upload-file {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300s;
        client_max_body_size 100M;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300s;
    }

    location ~ /\.ht {
        deny all;
    }
}