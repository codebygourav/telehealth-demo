# ==============================================================
# HOST NGINX REVERSE PROXY — dr-sushil-clinic.deploymeta.com
# Place this file at: /etc/nginx/sites-available/dr-sushil-clinic
# Then: ln -sf /etc/nginx/sites-available/dr-sushil-clinic \
#              /etc/nginx/sites-enabled/dr-sushil-clinic
# Then run: certbot --nginx -d dr-sushil-clinic.deploymeta.com
# ==============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dr-sushil-clinic.deploymeta.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (Certbot will fill in the SSL certificate paths)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dr-sushil-clinic.deploymeta.com;

    # --- SSL certificates (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/dr-sushil-clinic.deploymeta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-sushil-clinic.deploymeta.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase proxy timeouts for slow API responses
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # Pass the real client IP and protocol to upstream containers
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # --------------------------------------------------
    # 1. Doctor app at /doctor subpath
    # --------------------------------------------------
    location /doctor {
        proxy_pass http://127.0.0.1:8200;
    }

    location /doctor/_next/ {
        proxy_pass http://127.0.0.1:8200/doctor/_next/;
    }

    # --------------------------------------------------
    # 2. Backend: Admin panel, API, storage, assets
    # --------------------------------------------------
    location ~ ^/(admin|api|storage|livewire|build|vendor|css|js|fonts|images|advertisments) {
        proxy_pass        http://127.0.0.1:8210;   # plain HTTP — Docker nginx on port 80
        client_max_body_size 100M;
    }

    # --------------------------------------------------
    # 3. Patient app at root (everything else)
    # --------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8201;
    }
}
