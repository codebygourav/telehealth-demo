# ==============================================================
# CONSOLIDATED DOMAIN ROUTING: dr-sushil-clinic.deploymeta.com
# ==============================================================
server {
    listen 80;
    server_name dr-sushil-clinic.deploymeta.com;

    # 1. Doctor app hosted under subpath /doctor
    location /doctor {
        proxy_pass http://127.0.0.1:8200; # Doctor Docker port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Next.js Doctor Static Assets (due to basePath: '/doctor')
    location /doctor/_next/ {
        proxy_pass http://127.0.0.1:8200/doctor/_next/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Backend Web (Admin panel at /admin, API at /api, assets at /storage)
    location ~ ^/(admin|api|storage|livewire|build|vendor|css|js|fonts|images|advertisments) {
        proxy_pass http://127.0.0.1:8210; # Backend Web Docker port (Nginx)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # 4. Patient app at the root (everything else)
    location / {
        proxy_pass http://127.0.0.1:8201; # Patient Docker port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
